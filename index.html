<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para ti...</title>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            text-align: center;
            overflow: hidden; 
        }

        .contenedor {
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        h2 { 
            font-weight: 300; 
            margin-bottom: 25px; 
            letter-spacing: 1px;
        }

        /* Imagen de la pantalla inicial */
        #imgInteractiva {
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: latido 3s infinite; 
        }

        #imgInteractiva:active {
            transform: scale(0.95); 
        }

        @keyframes latido {
            0% { transform: scale(1); box-shadow: 0 15px 35px rgba(0,0,0,0.6); }
            50% { transform: scale(1.03); box-shadow: 0 20px 45px rgba(255,105,180,0.2); }
            100% { transform: scale(1); box-shadow: 0 15px 35px rgba(0,0,0,0.6); }
        }

        #seccionPassword {
            display: none;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            padding: 25px 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px); 
            box-sizing: border-box;
            animation: fadeIn 0.8s ease;
        }

        input {
            width: 80%;
            padding: 12px;
            margin: 15px 0;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            text-align: center;
            outline: none;
            background: rgba(255,255,255,0.9);
        }

        button {
            background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
            transition: transform 0.2s;
        }

        button:active {
            transform: scale(0.95);
        }

        #mensajeError {
            color: #ff8e8e;
            font-size: 14px;
            margin-top: 15px;
            min-height: 20px;
        }

        /* --- SECCIÓN DEL MENSAJE FINAL Y TARJETAS --- */
        #mensajeRevelado {
            display: none;
            position: relative; /* Importante para que las tarjetas cubran este div */
            background: rgba(255, 255, 255, 0.95);
            color: #333;
            border-radius: 20px;
            margin-top: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: fadeIn 1.2s ease;
            text-align: justify;
            overflow: hidden; /* Evita que las tarjetas sobresalgan al girar */
        }

        /* Contenedor del texto e imagen final */
        #contenidoFinal {
            padding: 30px;
        }

        #contenidoFinal h3 {
            color: #d81b60; 
            margin-top: 0;
            text-align: center;
        }

        /* Estilo para la imagen que va dentro del mensaje */
        .imagen-mensaje {
            width: 100%;
            border-radius: 15px;
            margin: 15px 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        #contenidoFinal p {
            line-height: 1.6;
            margin-bottom: 0;
        }

        /* Contenedor de las tarjetas sobrepuestas */
        #contenedorTarjetas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 columnas */
            grid-template-rows: repeat(3, 1fr);    /* 3 filas = 6 tarjetas */
            background-color: white; /* Fondo blanco extra para ocultar texto mientras cargan */
        }

        .tarjeta-wrapper {
            perspective: 1000px;
            width: 100%;
            height: 100%;
        }

        .tarjeta {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s, opacity 0.5s ease-out;
            transform-style: preserve-3d;
            cursor: pointer;
        }

        /* Clases dinámicas para girar y desaparecer */
        .tarjeta.volteada {
            transform: rotateY(180deg);
        }

        .tarjeta.oculta {
            opacity: 0;
            pointer-events: none;
            transform: rotateY(180deg) scale(0.8);
        }

        .tarjeta-cara {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            box-sizing: border-box;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
        }

        .tarjeta-dorso {
            background-color: #fff;
            transform: rotateY(180deg);
            color: #d81b60;
            border: 2px solid #f8bbd0;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.05);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <h2 id="instruccion">Toca la imagen...</h2>
        
        <img src="foto.png" alt="Imagen Especial" id="imgInteractiva">

        <div id="seccionPassword">
            <p>Introduce nuestra fecha especial:</p>
            <input type="text" id="inputClave" placeholder="DD/MM/AA" maxlength="8">
            <br>
            <button id="btnVerificar">Descifrar</button>
            <p id="mensajeError"></p>
        </div>

        <div id="mensajeRevelado">
            <div id="contenidoFinal">
                <h3>✨ ¡Bienvenida mi niña preciosaa! ✨</h3>
                <img src="foto_mensaje.png" alt="Nosotros" class="imagen-mensaje">
                <p>Aquí puedes escribir todo tu mensaje. Cuando ella termine de descubrir y quitar todas las tarjetas, podrá leer todo esto y ver la imagen superior. Quedará como un detalle súper romántico e inolvidable.</p>
            </div>

            <div id="contenedorTarjetas"></div>
        </div>
    </div>

    <script>
        // Elementos del DOM
        const imagen = document.getElementById('imgInteractiva');
        const instruccion = document.getElementById('instruccion');
        const seccionPassword = document.getElementById('seccionPassword');
        const inputClave = document.getElementById('inputClave');
        const btnVerificar = document.getElementById('btnVerificar');
        const mensajeError = document.getElementById('mensajeError');
        const mensajeRevelado = document.getElementById('mensajeRevelado');
        const contenedorTarjetas = document.getElementById('contenedorTarjetas');

        // Configuración inicial de la imagen principal
        const imagenes = ["foto.png"];
        let indiceActual = 0;
        let intervaloCarrusel;

        function cambiarImagen() {
            imagen.style.opacity = 0;
            setTimeout(() => {
                indiceActual = (indiceActual + 1) % imagenes.length;
                imagen.src = imagenes[indiceActual];
                imagen.style.opacity = 1;
            }, 250); 
        }
        intervaloCarrusel = setInterval(cambiarImagen, 4000);

        imagen.addEventListener('click', () => {
            clearInterval(intervaloCarrusel);
            imagen.style.display = "none";
            instruccion.style.display = "none";
            seccionPassword.style.display = "block";
            inputClave.focus(); 
        });

        // Formato de la fecha
        inputClave.addEventListener('input', function (e) {
            let valor = e.target.value.replace(/\D/g, ''); 
            if (valor.length > 6) valor = valor.substring(0, 6);
            
            let valorFormateado = '';
            if (valor.length > 0) valorFormateado += valor.substring(0, 2);
            if (valor.length >= 3) valorFormateado += '/' + valor.substring(2, 4);
            if (valor.length >= 5) valorFormateado += '/' + valor.substring(4, 6);
            
            e.target.value = valorFormateado;
        });

        // Confeti
        function lanzarConfeti() {
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6, x: 0.2 }, colors: ['#ff69b4', '#ff1493', '#ffffff'] });
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6, x: 0.8 }, colors: ['#ff69b4', '#ff1493', '#ffffff'] });
        }

        // --- SISTEMA DE TARJETAS ---
        const frasesTarjetas = [
            "Eres mi sol ☀️",
            "Me haces sonreír 😊",
            "Amo tus abrazos 🤗",
            "Mi persona favorita 💕",
            "Eres mi paz ✨",
            "Te quiero mucho ❤️"
        ];

        // Colores sacados de tu imagen de ejemplo
        const coloresPasteles = ["#C69B9B", "#EED2D2", "#7A6565", "#E79B9B", "#F5D6D6", "#593D3D"];

        function inicializarTarjetas() {
            let tarjetasOcultas = 0;

            frasesTarjetas.forEach((frase, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tarjeta-wrapper';
                
                const tarjeta = document.createElement('div');
                tarjeta.className = 'tarjeta';
                
                const frente = document.createElement('div');
                frente.className = 'tarjeta-cara tarjeta-frente';
                frente.style.backgroundColor = coloresPasteles[index];
                
                const dorso = document.createElement('div');
                dorso.className = 'tarjeta-cara tarjeta-dorso';
                dorso.innerText = frase;

                tarjeta.appendChild(frente);
                tarjeta.appendChild(dorso);
                wrapper.appendChild(tarjeta);
                
                // Lógica de clics en las tarjetas
                tarjeta.addEventListener('click', function() {
                    if (!this.classList.contains('volteada')) {
                        // Primer clic: Gira la tarjeta
                        this.classList.add('volteada');
                    } else if (!this.classList.contains('oculta')) {
                        // Segundo clic: Desaparece la tarjeta
                        this.classList.add('oculta');
                        tarjetasOcultas++;
                        
                        // Si todas se ocultaron, quitamos el contenedor para poder tocar el texto base
                        if (tarjetasOcultas === frasesTarjetas.length) {
                            setTimeout(() => {
                                contenedorTarjetas.style.pointerEvents = 'none';
                                contenedorTarjetas.style.background = 'transparent';
                            }, 500);
                        }
                    }
                });

                contenedorTarjetas.appendChild(wrapper);
            });
        }

        // Verificación de clave
        function verificarClave() {
            const password = inputClave.value;

            if (btoa(password) === "MjUvMDcvMjU=") {
                seccionPassword.style.display = "none";
                mensajeRevelado.style.display = "block";
                
                inicializarTarjetas(); // Creamos las tarjetas justo al descubrir la clave
                lanzarConfeti();
                
            } else {
                mensajeError.innerText = "Esa no es... intenta con el formato: 00/00/00";
                inputClave.value = ""; 
                
                seccionPassword.style.transform = "translateX(10px)";
                setTimeout(() => seccionPassword.style.transform = "translateX(-10px)", 100);
                setTimeout(() => seccionPassword.style.transform = "translateX(0)", 200);
            }
        }

        btnVerificar.addEventListener('click', verificarClave);
        inputClave.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                verificarClave();
            }
        });
    </script>
</body>
</html>
